# railway.toml – Railway deployment configuration for AuraStay
#
# Railway will use Nixpacks to detect a Next.js project and automatically
# choose the right Node version. We override the build/start commands here
# to be explicit and avoid any ambiguity.
#
# See: https://docs.railway.com/reference/config-as-code

[build]
builder      = "nixpacks"
buildCommand = "npm run build"

# Tell Nixpacks explicitly which Node version to use.
# Next.js 16 requires Node >= 20.9.0; Railway's default is Node 18.
[build.nixpacksPlan.variables]
NIXPACKS_NODE_VERSION = "20"

[deploy]
# `next start` automatically reads the PORT env var that Railway injects.
startCommand          = "npm start"
restartPolicyType     = "on_failure"
restartPolicyMaxRetries = 10
